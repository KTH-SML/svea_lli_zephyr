# --- Logging ---
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_WIFI_LOG_LEVEL_DBG=y
CONFIG_NET_LOG=y

# --- Wi-Fi ---
CONFIG_WIFI=y
CONFIG_WIFI_ESP32=y

# --- Network stack ---
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_CONFIG_AUTO_INIT=n
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_STACK_SIZE=8192
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y

# --- micro-ROS ---
CONFIG_MICROROS=y
CONFIG_MICROROS_TRANSPORT_UDP=y
CONFIG_MICROROS_XRCE_DDS_MTU="512"
CONFIG_MICROROS_PUBLISHERS="1"
CONFIG_MICROROS_SUBSCRIBERS="0"
CONFIG_MICROROS_SERVERS="0"
CONFIG_MICROROS_CLIENTS="0"
CONFIG_NET_L2_ETHERNET=y

# --- Memory ---
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=16384